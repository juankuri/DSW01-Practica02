name: 03 Cypress E2E

on:
    workflow_run:
        workflows: ["02 SonarCloud analysis"]
        branches: ["main", "dev"]
        types:
            - completed
    workflow_dispatch:

jobs:
    cypress-tests:
        name: Frontend - Cypress E2E
        runs-on: ubuntu-latest
        if: ${{ success() }}

        steps:
            - name: Checkout code
              uses: actions/checkout@8e5e7e5ab8b370d6c329ec480dd894686673b4a1

            - name: Set up Node.js
              uses: actions/setup-node@99b8673ff64fbf33d533407f4f4e8f7e5054a0d3
              with:
                  node-version: "22.x"
                  cache: npm
                  cache-dependency-path: frontend/package-lock.json

            - name: Install frontend dependencies
              working-directory: frontend
              run: |
                  if [ -f package-lock.json ]; then
                    echo "Found package-lock.json — running npm ci with scripts disabled"
                    npm ci --ignore-scripts
                  else
                    echo "Missing package-lock.json; refusing to install unlocked dependencies"
                    exit 1
                  fi

            - name: Set up JDK 17
              uses: actions/setup-java@99b8673ff64fbf33d533407f4f4e8f7e5054a0d3
              with:
                  java-version: "17"
                  distribution: temurin
                  cache: maven

            - name: Build backend
              run: mvn -B -DskipTests=true package

            - name: Start backend server
              run: |
                  java -jar target/*.jar &
                  sleep 10
              env:
                  SPRING_PROFILES_ACTIVE: test

            - name: Run Cypress tests
              uses: cypress-io/github-action@1b70233146622b1173e76efb3c6349ba1e934c98
              with:
                  working-directory: frontend
                  install: false
                  start: npm start -- --host 0.0.0.0 --port 4200
                  wait-on: "http://localhost:4200"
                  wait-on-timeout: 120
                  browser: chrome
                  command: npm run cy:run
              env:
                  CI: "true"

            - name: Upload Cypress screenshots on failure
              if: failure()
              uses: actions/upload-artifact@f592c03fdfca4c7c5a95b40431e90e31cfbc36a5
              with:
                  name: cypress-artifacts
                  path: frontend/cypress/screenshots
