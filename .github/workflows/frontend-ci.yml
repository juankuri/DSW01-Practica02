name: Frontend CI

on:
    push:
        branches: [main, develop]
    pull_request:
        branches: [main, develop]

jobs:
    unit-and-e2e:
        name: Unit tests + Cypress
        runs-on: ubuntu-latest
        strategy:
            matrix:
                node-version: [22.x]
        defaults:
            run:
                working-directory: frontend
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: "npm"
                  cache-dependency-path: frontend/package-lock.json

            - name: Install frontend dependencies
              working-directory: frontend
              run: |
                  # prefer a clean install when lockfile exists; fall back to npm install if npm ci fails
                  if [ -f package-lock.json ]; then
                    echo "Found package-lock.json — running npm ci (fallback to npm install on failure)"
                    npm ci || npm install
                  else
                    npm install
                  fi

            - name: Run frontend unit tests
              working-directory: frontend
              env:
                  CI: true
              run: npm test -- --watch=false

            - name: Run security audit (non-blocking)
              working-directory: frontend
              continue-on-error: true
              run: npm audit --audit-level=high

            - name: SonarCloud scan
              uses: SonarSource/sonarcloud-github-action@v3
              env:
                  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  args: >-
                      -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
                      -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
                      -Dsonar.sources=frontend/src,src/main/java
                      -Dsonar.exclusions=**/node_modules/**,**/dist/**,**/target/**,**/cypress/**,**/frontend/node_modules/**,**/frontend/dist/**

            - name: Run Cypress E2E
              uses: cypress-io/github-action@v6
              with:
                  working-directory: frontend
                  install: false
                  start: npm start -- --host 0.0.0.0 --port 4200
                  wait-on: "http://localhost:4200"
                  wait-on-timeout: 60
                  browser: chrome
              env:
                  CI: true
