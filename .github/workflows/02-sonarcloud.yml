name: 02 SonarCloud analysis

on:
    push:
        branches: ["main", "dev"]
    workflow_dispatch:

permissions:
    contents: read

jobs:
    analysis:
        name: SonarCloud Scan
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@8e5e7e5ab8b370d6c329ec480dd894686673b4a1
              with:
                  fetch-depth: 0

            - name: Set up JDK 17
              uses: actions/setup-java@99b8673ff64fbf33d533407f4f4e8f7e5054a0d3
              with:
                  java-version: "17"
                  distribution: temurin
                  cache: maven

            - name: Build and analyze with SonarCloud
              run: |
                  mvn clean verify -DskipTests \
                    org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
                    -Dsonar.projectKey=juankuri_DSW01-Practica02 \
                    -Dsonar.organization=juankuri-1 \
                                        -Dsonar.host.url=https://sonarcloud.io \
                                        -Dsonar.qualitygate.wait=true
              env:
                  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
