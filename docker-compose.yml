services:
    postgres:
        image: postgres:15
        container_name: empleados-db
        environment:
            POSTGRES_DB: ${DB_NAME:-dsw01db}
            POSTGRES_USER: ${DB_USERNAME:-postgres}
            POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
        ports:
            - "${DB_PORT:-5432}:5432"
        volumes:
            - empleados_pg_data:/var/lib/postgresql/data
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-dsw01db}",
                ]
            interval: 10s
            timeout: 5s
            retries: 5

    app:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: empleados-app
        environment:
            SERVER_PORT: ${SERVER_PORT:-8080}
            DB_HOST: postgres
            DB_PORT: 5432
            DB_NAME: ${DB_NAME:-dsw01db}
            DB_USERNAME: ${DB_USERNAME:-postgres}
            DB_PASSWORD: ${DB_PASSWORD:-postgres}
            APP_BASIC_USER: ${APP_BASIC_USER:-admin}
            APP_BASIC_PASSWORD: ${APP_BASIC_PASSWORD:-admin123}
        ports:
            - "${APP_PORT:-8080}:8080"
        depends_on:
            postgres:
                condition: service_healthy

    frontend:
        build:
            context: ./frontend
            dockerfile: Dockerfile
        container_name: empleados-frontend
        ports:
            - "${FRONTEND_PORT:-8081}:80"
        depends_on:
            app:
                condition: service_started

volumes:
    empleados_pg_data:
